# Kimi CLI Configuration
# This file configures Kimi CLI to automatically load local skills

skills:
  # Auto-load skills from these directories
  auto_load:
    - github-task-workflow
    - local-workflow
    - ai-config
    - github-cli-skill
    - spark-task-init-skill
    - tracing

  # Task file patterns that trigger workflow
  task_patterns:
    - "tasks/**/*.md"
    - "docs/tasks/**/*.md"
    - "**/*.task.md"

  # Default workflow for task execution
  default_workflow: github-task-workflow
